name: CI and CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar inspeccion de codigo
        run: npm run lint

      - name: Ejecutar pruebas automatizadas
        run: npm test

      - name: Ejecutar build local
        run: npm run build

      - name: Instalar Vercel CLI
        if: github.event_name == 'push'
        run: npm install --global vercel

      - name: Descargar configuracion de Vercel
        if: github.event_name == 'push'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Construir proyecto para Vercel
        if: github.event_name == 'push'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Desplegar en Vercel
        if: github.event_name == 'push'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Notificar resultado en Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          COMMIT_AUTHOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL no está configurado. Se omite la notificación."
            exit 0
          fi

          FECHA_HORA=$(date '+%d/%m/%Y %H:%M:%S UTC')

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_TITLE="✅ CI/CD Pipeline completado correctamente"
            STATUS_DETAIL="Las validaciones automáticas finalizaron sin errores y el despliegue fue ejecutado correctamente."
          else
            STATUS_TITLE="❌ CI/CD Pipeline fallido"
            STATUS_DETAIL="Una o más etapas fallaron. El despliegue no se ejecutó o no finalizó correctamente."
          fi

          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          MENSAJE=$(printf '%s\n\n%s\n\nRepositorio: %s\nEvento: %s\nRama: %s\nCommit: %s\nSHA: %s\nAutor: %s\nFecha y hora: %s\nEjecución: %s' "$STATUS_TITLE" "$STATUS_DETAIL" "$REPOSITORY" "$EVENT_NAME" "$BRANCH" "$COMMIT_MESSAGE" "$SHORT_SHA" "$COMMIT_AUTHOR" "$FECHA_HORA" "$RUN_URL")

          PAYLOAD=$(MENSAJE="$MENSAJE" python3 -c "import json, os; print(json.dumps({'content': os.environ['MENSAJE']}))")

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"